<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>defenv</title>
<style>
  :root {
    --bg: #f7f8fb; --panel: #ffffff; --panel-2: #f1f3f8; --border: #e3e6ee;
    --text: #1a1d24; --muted: #6b7280; --faint: #9aa1ad;
    --brand: #15a05a; --brand-strong: #0f7f46; --brand-soft: rgba(21,160,90,.12);
    --accent: #5b6ef5; --accent-soft: rgba(91,110,245,.12);
    --danger: #e11d48; --danger-soft: rgba(225,29,72,.12);
    --shadow: 0 10px 30px rgba(20,30,60,.10);
    --mono: "JetBrains Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #0c1018; --panel: #151b28; --panel-2: #1e2738; --border: #2c3850;
    --text: #e9eff9; --muted: #9aa9c2; --faint: #60708a;
    --brand: #46e08a; --brand-strong: #22c55e; --brand-soft: rgba(70,224,138,.15);
    --accent: #8b9dff; --accent-soft: rgba(139,157,255,.16);
    --danger: #fb7185; --danger-soft: rgba(251,113,133,.16);
    --shadow: 0 14px 36px rgba(0,0,0,.55);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    transition: background .2s, color .2s; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 22px 20px 120px; }

  header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .logo { font-family: var(--mono); font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .logo span { color: var(--brand); }
  .sub { color: var(--faint); font-size: 13px; }
  .spacer { flex: 1; }

  button { font-family: inherit; cursor: pointer; }
  .btn, .btn-primary, .icon-btn {
    border-radius: 9px; font-size: 13px; padding: 7px 12px; border: 1px solid var(--border);
    background: transparent; color: var(--text); transition: border-color .15s, background .15s, opacity .15s;
    display: inline-flex; align-items: center; gap: 6px; line-height: 1;
  }
  .btn svg, .btn-primary svg { width: 14px; height: 14px; flex: 0 0 auto; }
  .btn .plus, .btn-primary .plus { opacity: .9; }
  .btn:hover, .icon-btn:hover { border-color: var(--brand); }
  .btn-primary { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 600; }
  .btn-primary:hover { background: var(--brand-strong); border-color: var(--brand-strong); }
  .btn-primary:disabled, .btn:disabled { opacity: .4; cursor: not-allowed; }
  .icon-btn { padding: 6px 10px; }
  .icon-btn svg { width: 15px; height: 15px; display: block; }

  .spacebar { display: flex; align-items: center; gap: 4px; padding: 3px 6px 3px 10px; border: 1px solid var(--border); border-radius: 11px; background: var(--panel); }
  .spacelabel { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); margin-right: 2px; }
  .space-select { font-family: var(--mono); font-size: 13px; font-weight: 600; background: transparent; border: none; color: var(--accent); outline: none; padding: 4px 2px; cursor: pointer; max-width: 180px; }
  .space-select option { color: var(--text); background: var(--panel); }

  nav.tabs { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .pill { border-radius: 999px; padding: 6px 16px; font-size: 13px; border: 1px solid var(--border); background: transparent; color: var(--text); }
  .pill.active { background: var(--brand); border-color: var(--brand); color: #fff; }
  .search { margin-left: auto; }
  .searchwrap { position: relative; }
  .searchwrap .search-box { padding-right: 28px; width: 100%; }
  .search-clear { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); border: none; background: transparent; color: var(--faint); font-size: 18px; line-height: 1; cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .search-clear:hover { color: var(--text); background: var(--panel-2); }
  .chip.ok { color: var(--brand); border-color: var(--brand); background: var(--brand-soft); }
  .chip.missing { color: var(--danger); border-color: var(--danger); background: var(--danger-soft); }
  .required { margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 10px; }
  .req-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .missing-note { color: var(--danger); font-size: 13px; margin-top: 8px; font-weight: 500; }
  .ok-note { color: var(--brand); font-size: 13px; margin-top: 8px; }
  input.search-box, input.fld, select.fld, textarea.fld {
    font-family: inherit; font-size: 13px; color: var(--text); background: transparent;
    border: 1px solid var(--border); border-radius: 9px; padding: 8px 11px; outline: none; transition: border-color .15s;
  }
  input.search-box:focus, .fld:focus { border-color: var(--brand); }
  .mono { font-family: var(--mono); }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .hint { color: var(--faint); font-size: 13px; }

  .card { border: 1px solid var(--border); background: var(--panel); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .card.dashed { background: transparent; border-style: dashed; }
  .card.pad { padding: 16px; }
  .ghead { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
  .dashed .ghead { border-bottom: none; }
  .caret { color: var(--faint); transition: transform .2s; display: inline-block; }
  .collapsed .caret { transform: rotate(-90deg); }
  .gname { font-family: var(--mono); font-size: 14px; font-weight: 600; background: transparent; border: 1px solid transparent; color: var(--text); border-radius: 6px; padding: 2px 6px; }
  .gname:focus { border-color: var(--brand); outline: none; }
  .count { border: 1px solid var(--border); border-radius: 999px; padding: 0 8px; font-size: 11px; color: var(--faint); }
  .ghead .acts { margin-left: auto; display: flex; gap: 2px; }
  .lnk { background: none; border: none; color: var(--muted); font-size: 12px; padding: 3px 7px; border-radius: 5px; }
  .lnk:hover { color: var(--brand); }
  .lnk.danger:hover { color: var(--danger); }

  .collapsible { display: grid; grid-template-rows: 1fr; transition: grid-template-rows .22s ease; }
  .collapsible.closed { grid-template-rows: 0fr; }
  .collapsible > .inner { overflow: hidden; }

  .row { display: grid; grid-template-columns: auto minmax(120px,1fr) minmax(150px,1.4fr) auto auto; gap: 8px; align-items: center; padding: 6px 14px; }
  .vitem:hover { background: var(--panel-2); }
  .vitem.selected { background: var(--accent-soft); box-shadow: inset 3px 0 0 var(--accent); }
  .vitem.selected:hover { background: var(--accent-soft); }
  .selbox { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); margin: 0; }
  .selbar { display: flex; align-items: center; gap: 14px; margin: 0 0 14px; padding: 9px 14px; border: 1px solid var(--accent); background: var(--accent-soft); border-radius: 10px; font-size: 13px; color: var(--text); }
  .danger-btn { border-radius: 9px; font-size: 13px; padding: 6px 12px; border: 1px solid var(--danger); background: var(--danger); color: #fff; font-weight: 600; cursor: pointer; }
  .danger-btn:hover { filter: brightness(1.08); }
  .empty-state { text-align: center; padding: 64px 24px; }
  .empty-state h2 { margin: 0 0 8px; font-size: 22px; }
  .empty-state .hint { margin: 0 0 20px; }
  .empty-state .btn-primary { display: inline-flex; }
  .acticons { display: flex; align-items: center; gap: 1px; }
  .iconbtn { background: none; border: none; padding: 4px; border-radius: 6px; color: var(--faint); cursor: pointer; display: inline-flex; align-items: center; transition: color .12s, background .12s; }
  .iconbtn:hover { background: var(--border); color: var(--text); }
  .iconbtn.on { color: var(--brand); }
  .iconbtn svg { width: 15px; height: 15px; display: block; }
  .vdesc { padding: 0 14px 7px 36px; }
  .vdesc input { width: 100%; font-size: 11px; color: var(--muted); background: transparent; border: 1px solid transparent; border-radius: 6px; padding: 2px 7px; font-family: var(--sans); }
  .vdesc input::placeholder { color: var(--faint); opacity: .7; }
  .vdesc input:hover { border-color: var(--border); }
  .vdesc input:focus { border-color: var(--brand); outline: none; color: var(--text); }
  .cell { width: 100%; font-family: var(--mono); font-size: 12px; background: transparent; border: 1px solid transparent; border-radius: 6px; padding: 5px 7px; color: var(--text); }
  .cell:hover { border-color: var(--border); }
  .cell:focus { border-color: var(--brand); outline: none; }
  .flags { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--faint); }
  .gsel { font-size: 11px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text); }
  .empty { padding: 12px 14px; color: var(--faint); font-size: 13px; }
  accent { accent-color: var(--brand); }
  input[type="checkbox"] { accent-color: var(--brand); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip { border-radius: 7px; padding: 2px 9px; font-size: 12px; }
  .chip.group { background: var(--brand-soft); color: var(--brand); }
  .chip.var { border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); }
  .chip.schema { background: var(--brand-soft); color: var(--brand); }
  .chip.warn { background: var(--danger-soft); color: var(--danger); }
  .titlebar { display: flex; align-items: center; gap: 10px; }
  .titlebar h3 { margin: 0; font-family: var(--mono); font-size: 16px; }
  .titlebar .acts { margin-left: auto; display: flex; gap: 2px; }
  .prow { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .path { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 50; animation: overlay-in .18s ease; }
  .modal { width: 100%; max-width: 440px; background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); animation: modal-in .22s cubic-bezier(.2,.8,.2,1); }
  .modal.wide { max-width: 640px; }
  .modal h3 { margin: 0 0 14px; font-family: var(--mono); font-size: 18px; }
  .label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); margin: 12px 0 5px; }
  .modal .fld { width: 100%; }
  .modal-acts { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .picklist { display: flex; flex-direction: column; gap: 5px; max-height: 300px; overflow: auto; }
  .pick { display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 9px; padding: 7px 10px; font-size: 13px; }
  .pick .k { font-family: var(--mono); }
  .pick .n { margin-left: auto; color: var(--faint); font-size: 11px; }
  pre.env { max-height: 52vh; overflow: auto; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--mono); font-size: 12px; line-height: 1.6; white-space: pre; }
  textarea.fld { width: 100%; min-height: 200px; resize: vertical; }

  /* toasts */
  .toasts { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 9px; z-index: 60; }
  .toast { border-radius: 11px; padding: 11px 15px; font-size: 13px; box-shadow: var(--shadow); border: 1px solid; animation: toast-in .28s cubic-bezier(.2,.8,.2,1), pop .3s ease; max-width: 360px; }
  .toast.ok { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }
  .toast.err { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes toast-in { from { opacity: 0; transform: translateY(10px) scale(.96); } to { opacity: 1; transform: none; } }
  @keyframes pop { 0% { transform: scale(.95);} 60% { transform: scale(1.03);} 100% { transform: scale(1);} }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">def<span>env</span></div>
      <div class="sub">group variables · compose schemas · generate project .env files</div>
      <div class="spacer"></div>
      <div class="spacebar">
        <span class="spacelabel">space</span>
        <select id="space-select" class="space-select"></select>
        <button class="icon-btn" id="space-new" title="New space">+</button>
        <button class="icon-btn" id="space-rename" title="Rename space">&#9998;</button>
        <button class="icon-btn" id="space-export" title="Export this space"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg></button>
        <button class="icon-btn" id="space-import" title="Import a space"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 7 7 17"/><path d="M16 17H7V8"/></svg></button>
        <button class="icon-btn" id="space-delete" title="Delete space">&#128465;</button>
        <input type="file" id="space-import-file" accept="application/json,.json" hidden />
      </div>
      <button class="icon-btn" id="theme-toggle" title="Toggle light / dark">&#9728;</button>
    </header>
    <nav class="tabs">
      <button class="pill active" data-tab="vars">Variables</button>
      <button class="pill" data-tab="schemas">Schemas</button>
      <button class="pill" data-tab="projects">Projects</button>
      <div class="search searchwrap" id="searchwrap">
        <input class="search-box fld" id="search" placeholder="search keys / values…" />
        <button class="search-clear" id="search-clear" title="Clear search" hidden>&times;</button>
      </div>
    </nav>
    <div id="content"></div>
  </div>
  <div id="modal-root"></div>
  <div class="toasts" id="toast-root"></div>
  <script src="/app.js"></script>
</body>
</html>
